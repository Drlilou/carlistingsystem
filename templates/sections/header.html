<!-- Hidden element to tell JS if admin is logged in -->
<div id="admin-status" data-is-admin="{{ 'true' if session.get('admin_logged_in') else 'false' }}" style="display:none;"></div>

<header id="header">
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <img src="{{ url_for('static', filename='images/src/logo.png') }}" alt="RamziCars">

                <div class="nav-toggle" id="navToggle">☰</div>

                <div class="nav-menu" id="navMenu">
                <!-- In templates/sections/header.html, inside .nav-menu -->
                    <a href="#home">Home</a>
                    <a href="#about">About</a>
                    <a href="#cars">Cars</a>
                    <a href="#contacts">Contacts</a>
                    {% if session.admin_logged_in %}
                        <a href="{{ url_for('add_car') }}">add Car</a>
                   
                         <a href="{{url_for('logout')}}">logout</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
</header>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const toggle = document.getElementById("navToggle");
    const menu = document.getElementById("navMenu");
    toggle?.addEventListener("click", () => menu?.classList.toggle("active"));
});
</script>
